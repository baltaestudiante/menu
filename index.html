<script>
(function() {
    // ==========================================================================
    // CONFIGURACIÓN BARRA LATERAL
    // ==========================================================================
    const SIDEBAR_CONFIG = {
        BREAKPOINT: 768,
        COLOR: '#0F0F0F',
        WIDTH_EXPANDED: '15%',
        WIDTH_COLLAPSED: '70px',
        MIN_WIDTH_EXPANDED: '180px'
    };

    // ==========================================================================
    // VARIABLES DE ESTADO
    // ==========================================================================
    let sidebarInitialized = false;
    let currentState = 'collapsed'; // 'collapsed' o 'expanded'

    // ==========================================================================
    // ESTILOS BARRA LATERAL
    // ==========================================================================
    const sidebarStyles = `
        /* ===== BARRA LATERAL ===== */
        .sidebar-desktop {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            background: ${SIDEBAR_CONFIG.COLOR};
            color: #fff;
            z-index: 900;
            transition: width 0.3s ease;
            overflow-x: hidden;
            overflow-y: auto;
            box-shadow: 2px 0 5px rgba(0,0,0,0.5);
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .sidebar-desktop::-webkit-scrollbar {
            display: none;
        }
        .sidebar-desktop.collapsed {
            width: ${SIDEBAR_CONFIG.WIDTH_COLLAPSED};
        }
        .sidebar-desktop.expanded {
            width: ${SIDEBAR_CONFIG.WIDTH_EXPANDED};
            min-width: ${SIDEBAR_CONFIG.MIN_WIDTH_EXPANDED};
        }
        
        @media (max-width: ${SIDEBAR_CONFIG.BREAKPOINT}px) {
            .sidebar-desktop {
                display: none !important;
            }
            
            /* Resetear estilos en móvil */
            body, #main-header, #category-filters, #content, .player-universal {
                margin-left: 0 !important;
                left: 0 !important;
                width: 100% !important;
            }
        }

        /* Botón toggle */
        .sidebar-toggle {
            display: flex;
            justify-content: flex-end;
            padding: 16px 12px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        .sidebar-toggle svg {
            width: 24px;
            height: 24px;
            fill: white;
            transition: transform 0.2s;
        }
        .sidebar-desktop.expanded .sidebar-toggle svg {
            transform: rotate(180deg);
        }

        /* Navegación */
        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 0 8px;
            margin-bottom: 30px;
        }
        .sidebar-nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 8px;
            white-space: nowrap;
            transition: background 0.2s;
        }
        .sidebar-nav-item:hover {
            background: rgba(255,255,255,0.1);
        }
        .sidebar-nav-item.active {
            background: rgba(255,255,255,0.2);
        }
        .sidebar-nav-item img {
            width: 24px;
            height: 24px;
            filter: brightness(1.2);
            flex-shrink: 0;
        }
        .sidebar-nav-item span {
            font-size: 14px;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        .sidebar-desktop.collapsed .sidebar-nav-item span {
            display: none;
        }

        /* Sección de recomendados */
        .sidebar-desktop.collapsed .sidebar-rec-section {
            display: none;
        }
        .sidebar-rec-section {
            padding: 0 8px;
            margin-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 16px;
        }
        .sidebar-rec-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .sidebar-rec-header a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.9;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sidebar-rec-header a:hover {
            opacity: 1;
        }
        .sidebar-rec-header svg {
            width: 16px;
            height: 16px;
            fill: white;
        }
        .sidebar-rec-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .sidebar-rec-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }
        .sidebar-rec-item-info {
            flex: 1;
            min-width: 0;
        }
        .sidebar-rec-item-title {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sidebar-rec-item-author {
            font-size: 11px;
            opacity: 0.7;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sidebar-rec-play-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .sidebar-rec-play-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        .sidebar-rec-play-btn svg {
            width: 18px;
            height: 18px;
            fill: white;
        }
    `;

    // ==========================================================================
    // FUNCIONES BARRA LATERAL
    // ==========================================================================
    function injectSidebarStyles() {
        if (document.getElementById('sidebar-desktop-styles')) return;
        const style = document.createElement('style');
        style.id = 'sidebar-desktop-styles';
        style.textContent = sidebarStyles;
        document.head.appendChild(style);
    }

    function getRecommendations() {
        try {
            return window.RECOMENDADOS || [];
        } catch (e) {
            return [];
        }
    }

    function renderSidebar() {
        const sidebar = document.createElement('aside');
        sidebar.className = `sidebar-desktop ${currentState}`;
        sidebar.id = 'sidebarDesktop';

        // Botón toggle
        const toggle = document.createElement('div');
        toggle.className = 'sidebar-toggle';
        toggle.id = 'sidebarDesktopToggle';
        toggle.innerHTML = '<svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>';

        // Navegación
        const nav = document.createElement('div');
        nav.className = 'sidebar-nav';
        nav.innerHTML = `
            <a href="/" class="sidebar-nav-item" title="Home" data-link>
                <img src="https://media.baltaanay.org/web/image/798-1b947c8d/Home%20%282%29.webp" alt="Home" loading="lazy">
                <span>Home</span>
            </a>
            <a href="/buscar" class="sidebar-nav-item" title="Explorar" data-link>
                <img src="https://www.baltaanay.org/web/image/986-2bf9d2bb/Search%20%282%29.webp" alt="Explorar" loading="lazy">
                <span>Explorar</span>
            </a>
            <a href="/subir" class="sidebar-nav-item" title="Cargar" data-link>
                <img src="https://www.baltaanay.org/web/image/991-1c3c204a/subir.webp" alt="Cargar" loading="lazy">
                <span>Cargar</span>
            </a>
            <a href="https://www.baltaanay.org/solicitud" class="sidebar-nav-item" title="Solicitar">
                <img src="https://www.baltaanay.org/web/image/922-f3d79ca9/xhbalta-aula.png" alt="Solicitar" loading="lazy">
                <span>Solicitar</span>
            </a>
            <a href="/my/home" class="sidebar-nav-item" title="Usuario" data-link>
                <img src="https://nikichitonjesus3.odoo.com/web/image/453-f4d8c1eb/user.png" alt="Usuario" loading="lazy">
                <span>Portal</span>
            </a>
        `;

        // Sección recomendados
        const recSection = document.createElement('div');
        recSection.className = 'sidebar-rec-section';
        recSection.innerHTML = `
            <div class="sidebar-rec-header">
                <a href="/novedades" data-link>
                    Recomendados
                    <svg viewBox="0 0 24 24"><path d="M14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
                </a>
            </div>
            <div class="sidebar-rec-list" id="sidebarRecList"></div>
        `;

        sidebar.appendChild(toggle);
        sidebar.appendChild(nav);
        sidebar.appendChild(recSection);
        return sidebar;
    }

    function populateSidebarRecommendations() {
        const container = document.getElementById('sidebarRecList');
        if (!container) return;

        const episodes = getRecommendations();

        if (!episodes.length) {
            container.innerHTML = '<div style="color:#aaa; padding:8px;">No hay recomendados</div>';
            return;
        }

        container.innerHTML = '';
        episodes.forEach(ep => {
            const title = ep.title || 'Sin título';
            const author = ep.author || (ep.series && ep.series.titulo_serie) || 'Desconocido';
            const item = document.createElement('div');
            item.className = 'sidebar-rec-item';
            item.innerHTML = `
                <div class="sidebar-rec-item-info">
                    <div class="sidebar-rec-item-title">${title}</div>
                    <div class="sidebar-rec-item-author">${author}</div>
                </div>
                <button class="sidebar-rec-play-btn" data-episode='${JSON.stringify(ep).replace(/'/g, "&#39;")}'>
                    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </button>
            `;
            
            const btn = item.querySelector('.sidebar-rec-play-btn');
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const epData = JSON.parse(btn.dataset.episode);
                if (typeof window.playEpisodeExpanded === 'function') {
                    window.playEpisodeExpanded(
                        epData.mediaUrl || '',
                        epData.type || 'audio',
                        epData.coverUrl || '',
                        epData.series?.portada_serie || epData.coverUrl || '',
                        epData.title || '',
                        epData.detailUrl || '',
                        epData.author || (epData.series?.titulo_serie) || 'Roberto',
                        epData.next || [],
                        epData.description || '',
                        true
                    );
                }
            });
            container.appendChild(item);
        });
    }

    function adjustLayout(expanded) {
        const body = document.body;
        const header = document.getElementById('main-header');
        const categories = document.getElementById('category-filters');
        const content = document.getElementById('content');
        const player = document.querySelector('.player-universal');

        const width = expanded ? SIDEBAR_CONFIG.WIDTH_EXPANDED : SIDEBAR_CONFIG.WIDTH_COLLAPSED;
        
        // Actualizar estado
        currentState = expanded ? 'expanded' : 'collapsed';
        
        // Solo aplicar si estamos en desktop
        if (window.innerWidth > SIDEBAR_CONFIG.BREAKPOINT) {
            body.style.marginLeft = width;
            
            if (header) {
                header.style.left = width;
                header.style.width = `calc(100% - ${width})`;
            }
            if (categories) {
                categories.style.left = width;
                categories.style.width = `calc(100% - ${width})`;
            }
            if (content) {
                content.style.marginLeft = width;
                content.style.maxWidth = `calc(1600px - ${width})`;
            }
            if (player) {
                player.style.left = width;
                player.style.width = `calc(100% - ${width})`;
            }
            
            body.classList.add('has-sidebar');
        }
    }

    function resetLayout() {
        const body = document.body;
        const header = document.getElementById('main-header');
        const categories = document.getElementById('category-filters');
        const content = document.getElementById('content');
        const player = document.querySelector('.player-universal');

        body.style.marginLeft = '';
        body.classList.remove('has-sidebar');
        
        if (header) {
            header.style.left = '';
            header.style.width = '';
        }
        if (categories) {
            categories.style.left = '';
            categories.style.width = '';
        }
        if (content) {
            content.style.marginLeft = '';
            content.style.maxWidth = '';
        }
        if (player) {
            player.style.left = '';
            player.style.width = '';
        }
    }

    function initSidebarToggle() {
        const sidebar = document.getElementById('sidebarDesktop');
        const toggle = document.getElementById('sidebarDesktopToggle');
        if (!sidebar || !toggle) return;

        // Remover listeners anteriores para evitar duplicados
        const newToggle = toggle.cloneNode(true);
        toggle.parentNode.replaceChild(newToggle, toggle);
        
        newToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            e.preventDefault();
            
            const isCollapsed = sidebar.classList.contains('collapsed');
            if (isCollapsed) {
                sidebar.classList.remove('collapsed');
                sidebar.classList.add('expanded');
                adjustLayout(true);
            } else {
                sidebar.classList.add('collapsed');
                sidebar.classList.remove('expanded');
                adjustLayout(false);
            }
        });
    }

    function setActiveNavItem() {
        const currentPath = window.location.pathname;
        document.querySelectorAll('.sidebar-nav-item').forEach(item => {
            const href = item.getAttribute('href');
            // Solo marcar como activo si es un enlace interno (tiene data-link)
            if (item.hasAttribute('data-link')) {
                item.classList.toggle('active', href === currentPath || (href === '/' && currentPath === '/'));
            }
        });
    }

    function removeExistingSidebar() {
        const oldSidebar = document.querySelector('.sidebar-desktop');
        if (oldSidebar) oldSidebar.remove();
        resetLayout();
    }

    function initSidebar() {
        // Prevenir múltiples inicializaciones
        if (sidebarInitialized) {
            // Solo actualizar estado activo
            setActiveNavItem();
            return;
        }

        const isMobile = window.matchMedia(`(max-width: ${SIDEBAR_CONFIG.BREAKPOINT}px)`).matches;
        
        if (isMobile) {
            removeExistingSidebar();
            return;
        }

        removeExistingSidebar();
        injectSidebarStyles();
        
        const sidebar = renderSidebar();
        document.body.insertBefore(sidebar, document.body.firstChild);
        populateSidebarRecommendations();
        initSidebarToggle();
        setActiveNavItem();
        
        // Aplicar layout inicial
        adjustLayout(currentState === 'expanded');
        
        sidebarInitialized = true;
        console.log('✅ Sidebar inicializada correctamente (modo SPA)');
    }

    // ==========================================================================
    // INICIALIZACIÓN SEGURA PARA SPA
    // ==========================================================================
    
    // Inicializar cuando el DOM esté listo
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initSidebar);
    } else {
        initSidebar();
    }

    // Escuchar cambios de tamaño (responsive)
    const mql = window.matchMedia(`(max-width: ${SIDEBAR_CONFIG.BREAKPOINT}px)`);
    if (mql.addEventListener) {
        mql.addEventListener('change', (e) => {
            if (e.matches) {
                removeExistingSidebar();
            } else {
                initSidebar();
            }
        });
    } else {
        mql.addListener((e) => {
            if (e.matches) {
                removeExistingSidebar();
            } else {
                initSidebar();
            }
        });
    }

    // Escuchar navegación SPA para actualizar item activo
    window.addEventListener('popstate', setActiveNavItem);
    
    // También escuchar posibles eventos personalizados de tu SPA
    document.addEventListener('spa-navigation', setActiveNavItem);
    
    // Exponer funciones útiles globalmente
    window.sidebarAPI = {
        refresh: populateSidebarRecommendations,
        setActive: setActiveNavItem,
        toggle: () => {
            const sidebar = document.getElementById('sidebarDesktop');
            if (sidebar) {
                const isCollapsed = sidebar.classList.contains('collapsed');
                if (isCollapsed) {
                    sidebar.classList.remove('collapsed');
                    sidebar.classList.add('expanded');
                    adjustLayout(true);
                } else {
                    sidebar.classList.add('collapsed');
                    sidebar.classList.remove('expanded');
                    adjustLayout(false);
                }
            }
        },
        expand: () => {
            const sidebar = document.getElementById('sidebarDesktop');
            if (sidebar && sidebar.classList.contains('collapsed')) {
                sidebar.classList.remove('collapsed');
                sidebar.classList.add('expanded');
                adjustLayout(true);
            }
        },
        collapse: () => {
            const sidebar = document.getElementById('sidebarDesktop');
            if (sidebar && sidebar.classList.contains('expanded')) {
                sidebar.classList.add('collapsed');
                sidebar.classList.remove('expanded');
                adjustLayout(false);
            }
        }
    };
})();
</script>
